name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff mypy
          
      - name: Lint with Ruff
        run: |
          cd backend
          ruff check .
          
      - name: Typecheck with Mypy
        run: |
          cd backend
          mypy app/
          
      - name: Test with pytest
        run: |
          cd backend
          pytest

  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          
      - name: Install dependencies
        run: pnpm install
        
      - name: Typecheck
        run: pnpm -r exec tsc --noEmit
        
      - name: Lint
        run: pnpm -r run lint
