services:
  # Backend API Service
  - type: web
    name: healthtribe-backend
    runtime: python
    region: oregon
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      # Database - Link to postgres service below
      - key: POSTGRES_USER
        fromDatabase:
          name: healthtribe-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: healthtribe-db
          property: password
      - key: POSTGRES_DB
        fromDatabase:
          name: healthtribe-db
          property: database
      - key: POSTGRES_HOST
        fromDatabase:
          name: healthtribe-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: healthtribe-db
          property: port
      
      # Redis - Link to redis service below
      - key: REDIS_URL
        fromService:
          type: redis
          name: healthtribe-redis
          property: connectionString
      
      # Clerk Authentication - SET THESE MANUALLY
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_JWT_PUBLIC_KEY
        value: ""
      
      # AI Provider - SET AT LEAST ONE MANUALLY
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: "llama-3.3-70b-versatile"
      - key: OPENROUTER_API_KEY
        value: ""
      - key: OPENROUTER_MODEL
        value: "openai/gpt-4o-mini"
      - key: TOGETHER_API_KEY
        value: ""
      - key: TOGETHER_MODEL
        value: "meta-llama/Meta-Llama-3.1-70B-Instruct-Turbo"
      
      # Project Config
      - key: PROJECT_NAME
        value: "HealthTribe AI"
      - key: API_V1_STR
        value: "/api/v1"

databases:
  # PostgreSQL Database
  - name: healthtribe-db
    databaseName: healthtribe_db
    region: oregon
    plan: starter
    ipAllowList: []

  # Redis Cache
  - name: healthtribe-redis
    region: oregon
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
